<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>EDEX UL - Cyber Terminal Dashboard</title>
<style>
  /* -- Reset & Base Styles -- */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: black;
    color: #0f0;
    font-family: 'Share Tech Mono monospace, monospace;
    user-select: none;
   /* Cyberpunk neon green and red theme variables */
  : {
    --bg-color: #000;
    --fg-color: #0f0;
    --accent-color: #0f0;
    --accent-red: #f21b3f;
    --panel-bg: rgba(0, 255, 0, 0.05);
    --panel-bg-red: rgba(242, 27, , 0.07);
    --glow-color: #0f0;
    --glow-color-red: #f21b3f;
    --scanline-opacity: 0.04;
    --scrollbar-bg: rgba(0,255,0,0.15);
    --scrollbar-thumb: rgba(0,255,0,0.75);
  }

  [data-theme="red"] {
    --fg-color: var(--accent-red);
    --accent-color: var(--accent-red);
    --panel-bg: var(--panel-bg-red);
    --glow-color: var(--glow-color-red);
    --scrollbar-bg: rgba(242, 27, 63, 0.15);
    --scrollbar-thumb: rgba(242, 27, 63, 0.75);
  }

  {
    background-color: var(--bg-color);
    color: var(--fg-color);
  }

  /* Scrollbar for panels */
  ::-webkit-scrollbar    width: 8px;
    height: 8px;
  }
  ::--scrollbar-track {
    background: var(--scrollbar-bg);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 4px;
  }

  /* Container flex layout */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    overflow: hidden    position: relative;
    background: black;
  }

  /* Canvas backgrounds */
  canvas#matrixRain, canvas#cyberGrid, canvas#particles, canvas#mouseGlow {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }

  /* CRT Scanline overlay */
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: var(--scanline-opacity);
    background:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 1px,
        rgba(0,0,0,0.1) 2px
 );
    z-index: 10;
   /* Glassmorphism Panels base */
  .panel {
    background: var(--panel-bg);
    border: 1px solid transparent;
    backdrop-filter: saturate(180%) blur(8px);
    box-shadow:
       0 12px var(--glow-color),
      inset 0 0 12px var(--glow-color);
    border-radius: 8px;
    color: var(--fg-color);
    padding: 12px 16px;
    overflow-y: auto;
    overflow-x: hidden;
   -select: text;
    display: flex;
    flex-direction: column;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  [data-theme="red"] .panel {
    background: var(--panel-bg);
    box-shadow:
      0 0 12px var(--glow-color-red),
      inset 0 0 12px var(--glow-color-red);
  }

  /* Animate borders */
  .panel.glowing {
    animation: borderGlow 3s infinite alternate ease-in-out;
  }

  @keyframes borderGlow {
    0% {
      box-shadow:
      0 0 12px var(--glow-color),
      inset 0 0 20px var(--glow-color);
    }
    100% {
      box-shadow:
      0 0 24px var(--glow-color),
      inset 0 0 30px var(--glow-color);
    }
  }

  /* Layout main dashboard */
  #dashboard {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
    padding: 10px 12px 10px 12px;
    gap: 12px;
    z-index: 20;
  }

  #leftPanel, #rightPanel {
    flex: 0 0 260px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #centerPanel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
  }

  /* Top status bar */
  #topStatusBar {
    position: relative;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-variant-numeric: tabular-nums;
    padding: 0 12px;
    border-bottom: 1px solid var(--accent-color);
    box-shadow: inset 0 -2px 15px var(--glow-color);
    background: rgba(0,0,0,0.6);
    z-index: 30;
  }
  #topStatusBar > div {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .statusItem {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .statusIcon {
    width: 18px;
    height: 18px;
    fill: var(--fg-color);
    filter: drop-shadow(0 0 1px var(--fg-color));
  }

  /* Panel titles */
  .panel .title {
    font-weight: 700;
    font-size: 1.15em;
    margin-bottom: 8px;
    user-select: none;
    letter-spacing: 1.2px;
  }

  /* Simulated usage bars (CPU, RAM, etc) */
  .usageBar {
    width: 100%;
    height: 20px;
    background: rgba(0, 255, 0, 0.1);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: inset 0 0 5px rgba(0,255,0,0.3);
    margin-bottom: 10px;
  }

  .usageBar > .fill {
    height: 100%;
    background: var(--accent-color);
    border-radius: 6px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent-color);
  }

  /* Animated border for usage bar fill */
  .usageBar > .fill.glowy {
    animation: pulseGlow 2.5s infinite ease-in-out;
  }
  @keyframes pulseGlow {
    0%,100% {
      box-shadow: 0 0 12px var(--accent-color);
    }
    50% {
      box-shadow: 0 0 25px var(--accent-color);
    }
  }

  /* Terminal styles */
  #terminal {
    background: transparent;
    outline: none;
    font-family: 'Share Tech Mono', monospace, monospace;
    font-size: 1em;
    color: var(--fg-color);
    flex: 1 1 auto;
    padding: 14px;
    line-height: 1.4em;
 border-radius: 8px;
    overflow-y: auto;
    box-shadow: inset 0 0 12px var(--glow-color);
    user-select: text;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Cursor blinking */
  .cursor {
    display: inline-block;
    width: 9px;
    height: 1em;
    background: var(--fg-color);
    vertical-align: bottom;
    margin-left: 2px;
    animation: blink 1s steps(2, start) infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  /* Scrollback and history */
  #terminal > .line {
    display: block;
  }

  /* Right panel network monitor graphs */
  #networkGraphs {
    flex: 1 1 auto;
    display: flex;
    gap: 12px;
  }
  #uploadGraph, #downloadGraph {
    flex: 1 1 50%;
    background: rgba(0,255,0,0.07);
    border: 1px solid var(--accent-color);
    border-radius: 6px;
    box-shadow: inset 0 0 12px var(--glow-color);
  }

  /* Bottom keyboard */
  #bottomKeyboard {
    height: 120px;
    background: var(--panel-bg);
    border-top: 1px solid var(--accent-color);
    box-shadow: inset 0 3px 15px var(--glow-color);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    user-select: none;
    z-index: 20;
  }
  #bottomKeyboard button.key {
    flex: 1 0 6%;
    min-width: 32px;
    max-width: 46px;
    background: transparent;
    border: 1px solid var(--accent-color);
    color: var(--fg-color);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1em;
    border-radius: 6px;
    box-shadow: 0 0 10px var(--glow-color);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #bottomKeyboard button.key:active {
    background: var(--accent-color);
    color: black;
    box-shadow: 0 0 25px var(--accent-color);
  }

  /* Window styles */
  .window {
    position: absolute;
    background: var(--panel-bg);
    border: 1px solid var(--accent-color);
    border-radius: 8px;
    box-shadow:
      0 0 12px var(--glow-color),
      inset 0 0 12px var(--glow-color);
    display: flex;
    flex-direction: column;
    resize: both;
    overflow: hidden;
    user-select: none;
  }
  .window[data-theme="red"] {
    box-shadow:
      0 0 12px var(--glow-color-red),
      inset 0 0 12px var(--glow-color-red);
    border-color: var(--accent-red);
  }

  .window .titlebar {
    background: rgba(0,0,0,0.6);
    color: var(--fg-color);
    font-weight: bold;
    padding: 6px 12px;
    cursor: move;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
  }

  .window .titlebar .buttons {
    display: flex;
    gap: 8px;
  }
  .window .titlebar button {
    background: transparent;
    border: none;
    color: var(--fg-color);
    font-weight: bold;
    font-size: 1.1em;
    cursor: pointer;
    padding: 0 6px;
    line-height: 1;
    filter: drop-shadow0 0 1px var(--fg-color));
    transition: color 0.3s ease;
  }
  .window .titlebar button:hover {
    color: var(--accent-color);
  }

  .window .content {
    flex: 1 1 auto;
    padding: 10px 14px;
    overflow: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9em;
    color: var(--fg-color);
    background: transparent;
  }

  /* Hide scrollbars but scroll anyway */
  .window .content::-webkit-scrollbar {
    width: 6px;
    background: transparent;
  }
  .window .content::-webkit-scrollbar-thumb {
    background: var(--accent-color);
    border-radius: 3px;
  }

  /* Settings panel content */
  #settingsPanel .form-group {
    margin-bottom: 16px;
  }
  #settingsPanel label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }
  #settingsPanel input[type="checkbox"] {
    margin-right: 8px;
  }

  /* Notification system */
  #notifications {
    position: fixed;
 bottom: 130px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 12000;
    max-width: 300px;
  }
  .notification {
    background: var(--panel-bg);
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow:
      0 0 12px var(--glow-color);
    color: var(--fg-color);
    font-weight: 600;
    animation: notifIn 0.4s ease forwards;
    user-select: none;
  }
  @keyframes notifIn {
    from {
      opacity: 0;
      transform: translateX(30px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* Command Palette */
  #commandPalette {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel-bg);
    border: 2px solid var(--accent-color);
    border-radius: 8px;
    width: 90vw;
    max-width: 500px;
    box-shadow:
      0 0 24px var(--glow-color);
    z-index: 15000;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #commandInput {
    width: 100%;
    padding: 14px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2em;
    color: var(--fg-color);
    background: transparent;
    border: none;
    outline: none;
  }
  #commandList {
    max-height: 300px;
    overflow-y: auto;
  }
  #commandList > .command {
    padding: 10px 18px;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }
  #commandList > .command:hover,
  #commandList > .command.selected {
    background: var(--accent-color);
    color: black;
  }

  /* FPS Counter */
  #fpsCounter {
    position: fixed;
    bottom: 10px;
    left: 12px;
    background: var(--panel-bg);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--fg-color);
    box-shadow: 0 0 12px var(--glow-color);
    user-select: none;
    z-index: 13000;
  }

  /* Responsive design */
  @media (max-width: 900px) {
    #dashboard {
      flex-direction: column;
      padding: 6px 8px;
    }
    #leftPanel, #rightPanel {
      flex: none;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
    }
    #centerPanel {
      flex: none;
      order: 3;
      height: 250px;
    }
    #bottomKeyboard {
      height: 80px;
    }
    #topStatusBar > div {
      gap: 12px;
      flex-wrap: wrap;
    }
  }

  /* Boot sequence styles */
  #bootScreen {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 40px;
    color: var(--fg-color);
    font-family: 'Share Tech Mono', monospace;
    z-index: 99999;
  }

  #bootScreen .bootMessage {
    font-size: 1.1em;
    letter-spacing: 1.6px;
    margin: 8px 0;
    white-space: nowrap;
    opacity: 0.8;
    filter: drop-shadow(0 0 4px var(--glow-color));
  }
  #bootScreen .loadingBarWrapper {
    width: 100%;
    height: 20px;
    background: rgba(0, 255, 0, 0.05);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 24px;
    box-shadow: inset 0 0 12px var(--glow-color);
  }
  #bootScreen .loadingBar {
    height: 100%;
    width: 0;
    background: var(--accent-color);
    border-radius: 12px 0 0 12px;
    box-shadow: 0 0 25px var(--accent-color);
    transition: width 0.1s ease;
  }

  /* Glitch animation for some headings */
  .glitch {
    position: relative;
    color: var(--accent-color);
    font-weight: 900    font-size: 2.5em;
    letter-spacing: 5px;
    margin-bottom: 6px;
  }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
    clip: rect(0, 900px, 0, 0);
  }
  .glitch::before {
    animation: glitch1 3s infinite linear alternate-reverse;
    color: var(--accent-red);
    left: 2px;
    text-shadow: -1px 0 var(--accent-red);
  }
  .glitch::after {
    animation: glitch2 2s infinite linear alternate-reverse;
    color: var(--accent-color);
    left: -2px;
    text-shadow: 1px 0 var(--accent-color);
  }
  @keyframes glitch1 {
    0% { clip: rect(0, 900px, 0, 0); }
    10% { clip: rect(2px, 900px, 12px, 0); }
    20% { clip: rect(15px, 900px, 27px, 0); }
    30% { clip: rect(0, 900px, 2px, 0); }
    40% { clip: rect(10px, 900px, 20px, 0); }
    50% { clip: rect(2px, 900px, 12px, 0); }
    60% { clip: rect(0, 900px, 0, 0); }
    100% { clip: rect(, 900px, 0, 0); }
  }
  @keyframes glitch2 {
    0% { clip: rect(0, 900px, 0, 0); }
    10% { clip: rect(8px, 900px, 20px, 0); }
    20% { clip: rect(20px, 900px, 30px, 0); }
    30% { clip: rect(0, 900px, 10px, 0); }
    40% { clip: rect(8px, 900px, 18px, 0); }
    50% { clip: rect(0, 900px, 0, 0); }
    60% { clip: rect(0, 900px, 0, 0); }
    100% { clip: rect(0, 900px, 0, 0); }
  }

  /* Smooth transitions */
  .smooth {
    transition: all 0.2s ease;
  }

  /* Ambient lighting effect */
  #ambientLight {
    position: fixed;
    top: 50%; left: 50%;
    pointer-events: none;
    width: 400px; height: 400px;
    background: radial-gradient(circle at center, var(--glow-color) 0%, transparent 80%);
    filter: blur(120px);
    transform: translate(-50%, -50%);
    opacity: 0.15;
    z-index: 0;
  }
  [data-theme="red"] #ambientLight {
    background: radial-gradient(circle at center, var(--glow-color-red) 0%, transparent 80%);
  }

  /* Buttons used in various places */
  button {
    user-select: none;
    outline: none;
  }

  /* Icon placeholders: simple SVG inline */
  svg.icon {
    display: inline-block;
    vertical-align: middle;
    fill: var(--fg-color);
    filter: drop-shadow(0 0 1.5px var(--glow-color));
  }
  [data-theme="red"] svg.icon {
    fill: var(--accent-red);
    filter: drop-shadow(0 0 2.2px var(--glow-color-red));
  }

</style>
</head>
<body>
<div id="bootScreen" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="glitch" data-text="EDEX ULTRA BOOT"></div>
  <div id="bootMessages" style="font-family: monospace; font-weight: 700; font-size: 1em; margin-top:12px; min-height: 26px;"></div>
  <div class="loadingBarWrapper" aria-label="Loading progress">
    <div id="loadingBar" class="loadingBar"></div>
  </div>
</div>

<div id="app" hidden>
  <canvas id="matrixRain"></canvas>
  <canvas id="cyberGrid"></canvas>
  <canvas id="particles"></canvas>
  <canvas id="mouseGlow"></canvas>
  <div id="ambientLight"></div>

  <div id="scanlines" aria-hidden="true"></div>

  <div id="topStatusBar" role="banner" aria-label="System status bar">
    <div id="leftStatus">
      <div class="statusItem" aria-live="polite" aria-atomic="true"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg><span id="liveClock" aria-label="Current time" role="timer">--:--:--</span></div>
      <div class="statusItem" aria-live="polite" aria-atomic="true"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><rect width="24" height="24" rx="4" ry="4"/></svg><span id="liveDate" aria-label="Current date">Loading date...</span></div>
    </div>
    <div id="rightStatus">
      <div class="statusItem" id="batteryStatus" aria-live="polite" aria-atomic="true" role="img" aria-label="Battery status" style="display:none;">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="6" width="18" height="12" rx="2"/><rect x="20" y="9" width="2" height="6"/></svg>
        <span id="batteryLevelPercent">--%</span>
      </div>
      <div class="statusItem" aria-live="polite" aria-atomic="true"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M3 12h18"/></svg><span id="networkStatus" aria-label="Network status">Offline</span></div>
      <div class="statusItem" aria-live="polite" aria-atomic="true"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg><span id="systemStatus" aria-label="System status">OK</span></div>
    </div>
  </div>

  <div id="dashboard" role="main" aria-label="Cyber Terminal Dashboard">
    <div id="leftPanel">
      <section class="panel glowing" aria-label="CPU Usage Monitor">
        <div class="title">CPU Usage</div>
        <div class="usageBar" aria-valuemin="0" aria-valuemax="100" role="progressbar" aria-label="CPU Usage">
          <div class="fill glowy" style="width 2%;"></div>
        </div>
      </section>
      
      <section class="panel glowing" aria-label="RAM Usage Monitor">
        <div class="title">RAM Usage</div>
        <div class="usageBar" aria-valuemin="0" aria-valuemax="100" role="progressbar" aria-label="RAM Usage">
          <div class="fill glowy" style="width: 2%;"></div>
        </div>
      </section>

      <section class="panel glowing" aria-label="GPU Usage Monitor (Simulated)">
        <div class="title">GPU Usage</div>
        <div class="usageBar" aria-valuemin="0" aria-valuemax="100" role="progressbar" aria-label="GPU Usage">
          <div class="fill glowy" style="width: 0%;"></div>
        </div>
      </section>
      
      <section class="panel glowing" aria-label="Storage Usage Monitor">
        <div class="title">Storage Usage</div>
        <div class="usageBar" aria-valuemin="0" aria-valuemax="100" role="progressbar" aria-label="Storage Usage">
          <div class="fill glowy" style="width: 0%;"></div>
        </div>
      </section>

      <section class="panel glowing" aria-label="Temperature Monitor (Simulated)">
        <div class="title">CPU Temperature</div>
        <div class="usageBar" aria-valuemin="0" aria-valuemax="100" role="progressbar" aria-label="CPU Temperature">
          <div class="fill glowy" style="width: 0%;"></div>
        </div>
      </section>
    </div>

    <div id="centerPanel" class="panel glowing" aria-label="Interactive terminal">
      <!-- Terminal -->
      <div id="terminal" role="textbox" aria-multiline="true" tabindex="0" aria-label="Cyber Terminal command line interface"></div>
    </div>

    <div id="rightPanel">
      <section class="panel glowing" aria-label="Network Monitor">
        <div class="title">Network Monitor</div>
        <div id="ping" aria-live="polite" aria-atomic="true">Ping: -- ms</div>
        <div id="networkGraphs">
          <canvas id="uploadGraph" width="150" height="80" aria-label="Upload graph"></canvas>
          <canvas id="downloadGraph" width="150" height="80" aria-label="Download graph"></canvas>
        </div>
      </section>

      <section class="panel glowing" aria-label="Active Processes">
        <div class="title">Active Processes</div>
        <ul id="activeProcesses" role="list" tabindex="0" aria-label="Simulated active processes" style="list-style-type:none; margin:0; padding-left: 16px; overflow-y:auto; max-height: 170px;"></ul>
      </section>

      <section class="panel glowing" aria-label="System Log Viewer">
        <div class="title">System Log</div>
        <pre id="systemLog" aria-live="polite" style="white-space: pre-wrap; overflow-y: auto; max-height: 140px;"></pre>
      </section>
    </div>
  </div>

  <div id="bottomKeyboard" aria-label="On-screen keyboard" role="application" tabindex="0" aria-live="pol">
    <!-- Dynamically populated -->
  </div>
</div>

<!-- Notifications container -->
<div id="notifications" aria-live="polite" aria-atomic="true"></div>

<!-- Command palette -->
<div id="commandPalette" role="dialog" aria-modal="true" aria-labelledby="commandInputLabel">
  <input type="text" id="commandInput" autocomplete="off" placeholder="Type a command..." aria-describedby="commandInputDesc" />
  <ul id="commandList" role="listbox" aria-label="Command suggestions" tabindex="0"></ul>
</div>

<!-- FPS Counter -->
<div id="fpsCounter" aria-live="off" aria-hidden="true">FPS: --</div>

// UTILITIES
const Utils = (() => {
  // Clamp a value between min and max
  function clamp(v, min, max) {return Math.min(Math.max(v, min), max);}
  // Format 2 digits with leading zeros
  function pad2(num) {return num.toString().padStart(2,"0");}
  // Generate random integer in [min, max]
  function randInt(min, max) {return Math.floor(Math.random() * (max - min + 1)) + min;}
  // Generate random float in [min, max)
  function randFloat(min, max) {return Math.random() * (max - min) + min;}
  // Sleep helper for async pauses
  function sleep(ms) {return new Promise(resolve => setTimeout(resolve, ms));}
  // Escape text for terminal
  function escapeHTML(text) {
    return text.replace(/[&<>"'`]/g, match => ({
      '&': '&amp;',': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '`': '&#96;'
    })[match]);
  }
  // Format bytes human readable
  function formatBytes(bytes) {
    if(bytes < 1024) return bytes + " B";
    let units = ['KB','MB','GB','TB'];
    let u = 0;
    let n = bytes;
    while(n >= 1024 && u < units.length - 1) {
      n /= 1024;
      u++;
    }
    return n.toFixed(1) + ' ' + units[u];
  }
  return {clamp, pad2, randInt, randFloat, sleep, escapeHTML, formatBytes};
})();

/* THEMES MODULE */
const Themes = (() => {
  const THEME_KEY = 'edexUltraTheme';
  let currentTheme = localStorage.getItem(THEME_KEY) || 'green';
  
  function applyTheme(theme) {
    currentTheme = theme;
    if (theme === 'red') {
     .documentElement.setAttribute('data-theme', 'red');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    localStorage.setItem(THEME_KEY, theme);
    notify(`Theme switched to ${theme.toUpperCase()}`, 2500);
  }
  function toggleTheme() {
    applyTheme(currentTheme === 'green' ? 'red' : 'green');
  }
  function getTheme() {
    return currentTheme;
  }
  return {applyTheme, toggleTheme, getTheme};
})();

/* NOTIFICATIONS MODULE */
const Notifications = (() => {
  const container = document.getElementById('notifications');
  const MAX_NOTIFICATIONS = 4;
  let activeNotifications = [];

  function show(message, duration = 4000) {
    if (!message) return;
    if (activeNotifications.length >= MAX_NOTIFICATIONS) {
      // Remove oldest
      const oldest = activeNotifications.shift();
      if (oldest) container.removeChild(oldest);
    }
    const notif = document.createElement('div');
    notif.className = 'notification';
    notif.textContent = message;
    container.appendChild(notif);
    activeNotifications.push(notif);
    setTimeout(() => {
      notif.style.opacity = '0';
      setTimeout(() => {
        if (notif.parentElement) notif.parentElement.removeChild(notif);
        activeNotifications = activeNotifications.filter(n => n !== notif);
      }, 500);
    }, duration);
  }
  return {show};
})();

/* PERFORMANCE MODULE FPS Counter */
const PerformanceMonitor = (() => {
  const fpsElem = document.getElementById('fpsCounter');
  let lastFrameTime = performance.now();
  let frames = 0;
  let fps = 0;
  let lastFpsUpdate = performance.now();

  function frame() {
    const now = performance.now();
    frames++;
    if (now - lastFpsUpdate > 1000) {
      fps = Math.round((frames * 1000) / (now - lastFpsUpdate));
      lastFpsUpdate = now;
      frames = 0;
      fpsElem.textContent = 'FPS: ' + fps;
    }
    lastFrameTime = now;
  }

  function show(showing) {
    fpsElem.style.display = showing ? 'block' : 'none';
  }

  return {frame, show};
})();

/* BOOT SEQUENCE MODULE */
const BootSequence = (() => {
  let bootMessages = [
    "Initializing BIOS...",
    "Performing system checks...",
    "Detecting hardware components...",
    "Loading drivers...",
    "Mounting filesystems...",
    "Starting system services...",
    "Checking network interfaces...",
    "Initializing GPU modules...",
    "Loading user interface...",
    "Boot sequence complete."
  ];
  let index = 0;
  let loadingBar;
  let messageElem;

  async function start() {
    const bootScreen = document.getElementById('bootScreen');
    loadingBar = document.getElementById('loadingBar');
    messageElem = document.getElementById('bootMessages');
    let totalSteps = bootMessages.length;
    bootScreen.hidden = false;

    for (index = 0; index < totalSteps; index++) {
      messageElem.textContent = bootMessages[index];
      loadingBar.style.width = ((index + 1) / totalSteps) * 100 + '%';
      // Simulate variable wait time 700ms -1100ms
      await Utils.sleep(Utils.randInt(700, 1100));
    }
    // Small pause on complete
    await Utils.sleep(500);
    bootScreen.hidden = true;
    document.getElementById('app').hidden = false;
    // Notify and start app
    Notifications.show('System Online.');
    Dashboard.init();
  }

  return {start};
})();

/* BACKGROUND ANIMATIONS */
const Background = (() => {
  const matrixCanvas = document.getElementById('matrixRain');
  const gridCanvas = document.getElementById('cyberGrid');
  const particlesCanvas = document.getElementById('particles');
  const mouseGlowCanvas = document.getElementById('mouseGlow');

  const matrixCtx = matrixCanvas.getContext('2d');
  const gridCtx = gridCanvas.getContext('2d');
  const particlesCtx = particlesCanvas.getContext('2d');
  const mouseGlowCtx = mouseGlowCanvas.getContext('2d');

  // Matrix rain attributes
  const matrixChars = '01あいうえおかきくけこさしすせそたちつてとなにぬねの0123456789';
  let matrixDrops; 

  // Cyber grid attributes
  let gridLines = [];
  const gridSpacing = 40;
  const gridColorOpacity = 0.04;

  // Particle system
  let particles = [];

  // Mouse glow
  let mouse = {x: -9999, y: -9999};

  // Resize all canvases
  function resize() {
    [matrixCanvas, gridCanvas, particlesCanvas, mouseGlowCanvas].forEach(c => {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    });
    initMatrixDrops();
    initGridLines();
    initParticles();
  }

  // Matrix Rain init
  function initMatrixDrops() {
    const cols = Math.floor(matrixCanvas.width / 14);
    matrixDrops = [];
    for(let i=0; i<cols; ++i) {
      matrixDrops[i] = Utils.randInt(1, matrixCanvas.height / 14);
    }
  }

  // Draw matrix rain
  function drawMatrix() {
    const w = matrixCanvas.width;
    const h = matrixCanvas.height;
    matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    matrixCtx.fillRect(0, 0, w, h);

    matrixCtx.font = '14px monospace';
    matrixCtx.fillStyle = 'rgba(0, 255, 0, 0.55)';
    for(let i=0; i<matrixDrops.length; ++i){
      let text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
      matrixCtx.fillText(text, i * 14, matrixDrops[i] * 14);
      if(matrixDrops[i] * 14 > h && Math.random() > 0.975) matrixDrops[i] = 0;
      matrixDrops[i]++;
    }
  }

  // Initialize grid lines
  function initGridLines() {
    gridLines = [];
    const w = gridCanvas.width;
    const h = gridCanvas.height;
    // Vertical lines
    for(let x=0; x<w; x += gridSpacing){
      gridLines.push({type:'v', x});
    }
    // Horizontal lines
    for(let y=0; y<h; y += gridSpacing){
      gridLines.push({type:'h', y});
    }
  }

  // Draw cyber grid lines
  function drawGrid() {
    const w = gridCanvas.width;
    const h = gridCanvas.height;
    gridCtx.clearRect(0, 0, w, h);
    gridCtx.strokeStyle = `rgba(0, 255, 0, ${gridColorOpacity})`;
    gridCtx.lineWidth = 1;
    gridCtx.shadowColor = '#0f0';
    gridCtx.shadowBlur = 3;

    gridLines.for(line => {
      gridCtx.beginPath();
      if(line.type === 'v') {
        gridCtx.moveTo(line.x, 0);
        gridCtx.lineTo(line.x, h);
      } else if(line.type === 'h') {
        gridCtx.moveTo(0, line.y);
        gridCtx.lineTo(w, line.y);
      }
      gridCtx.stroke();
    });
  }

  // Particles initialization
  function initParticles() {
    particles = [];
    const w = particlesCanvas.width;
    const h = particlesCanvas.height;
    for(let i = 0; i < 150; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        size: Utils.randFloat(0.5, 2.2),
        speedX: Utils.randFloat(-0.15, 0.15),
        speedY: Utils.randFloat(0.1, 0.3),
        opacity: Utils.randFloat(0.1, 0.4)
      });
    }
  }

  // Draw particles
  function drawParticles() {
    const ctx = particlesCtx;
    ctx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
    ctx.fillStyle = '#0f0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 3;
    particles.forEach(p => {
      ctx.globalAlpha = p.opacity;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      p.x += p.speedX;
      p.y += p.speedY;

      // Wrap around edges
      if(p.y > particlesCanvas.height) p.y = 0;
      if(p.x > particlesCanvas.width) p.x = 0;
      if(p.x < 0) p.x = particlesCanvas.width;
    });
    ctx.globalAlpha = 1.0;
  }

  // Mouse glow effect
  function drawMouseGlow() {
    const ctx = mouseGlowCtx;
    ctx.clearRect(0, 0, mouseGlowCanvas.width, mouseGlowCanvas.height);
    const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 100);
    gradient.addColorStop(0, 'rgba(0,255,0,0.5)');
    gradient.addColorStop(0.7, 'rgba(0,255,0,0.12)');
    gradient.addColorStop(1, 'rgba(0,255,0,0)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 100, 0, Math.PI * 2);
    ctx.fill();
  }

  // Update mouse position
  function mouseMoveHandler(e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  }

  // Main update loop
  function update() {
    drawMatrix();
    drawGrid();
    drawParticles();
    drawMouseGlow();
  }

  // Initialization
  function init() {
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', mouseMoveHandler);
    resize();
    return update;
  }

  return {init};
})();

/* DASHBOARD MODULE */
const Dashboard = (() => {
  // Elements references
  const liveClock = document.getElementById('liveClock');
  const liveDate = document.getElementById('liveDate');
  const batteryStatus = document.getElementById('batteryStatus');
  const batteryLevelPercent = document.getElementById('batteryLevelPercent');
  const networkStatus = document.getElementById('networkStatus');
  const systemStatus = document.getElementById('systemStatus');

  const cpuBar = document.querySelector('#leftPanel section:nth-child(1) .fill');
  const ramBar = document.querySelector('#leftPanel section:nth-child(2) .fill');
  const gpuBar = document.querySelector('#leftPanel section:nth-child(3) .fill');
  const storageBar = document.querySelector('#leftPanel section:nth-child(4) .fill');
  const tempBar = document.querySelector('#leftPanel section:nth-child(5) .fill');

  const terminal = document.getElementById('terminal');
  const activeProcessesList = document.getElementById('activeProcesses');
  const systemLog = document.getElementById('systemLog');

  const pingElem = document.getElementById('ping');
  const uploadGraph = document.getElementById('uploadGraph').getContext('2d');
  const downloadGraph = document.getElementById('downloadGraph').getContext('2d');

  const bottomKeyboard = document.getElementById('bottomKeyboard');

  const MAX_UPLOAD_HISTORY = 60;
  const MAX_DOWNLOAD_HISTORY = 60;
  
  let uploadHistory = [];
  let downloadHistory = [];

  // Simulated system data
  let cpuUsage = 0;
  let ramUsage = 0;
  let gpuUsage = 0;
  let storageUsage = 0;
  let cpuTemp = 0;

  // Terminal state
  let cmdHistory = [];
  let cmdHistoryIndex = -1;
  let terminalInput = '';
  let cursorVisible = true;
  let terminalFocused = false;

  // Active processes (simulated)
  const processes = [
    { pid: 1023, name: "systemd", cpu: 1.2 },
    { pid: 2047, name: "edex-ui", cpu: 5.3 },
    { pid: 3141, name: "net-monitor", cpu: 2.6 },
    { pid: 4123, name: "file-explorer", cpu: 1.8 },
    { pid: 5228, name: "terminal", cpu: 0.7 },
    { pid: 6121, name: "background-updater", cpu: 0.2 }
  ];

  // System log lines (initial)
  let logLines = [
    "[00:00:05] System initialized successfully.",
    "[00:00:10] Network connection established.",
    "[00:01:15] CPU temperature stable.",
    "[00:02:00] Active process list updated.",
  ];

  // Command palette commands
  const commands = [
    {name: 'help', desc: 'List all available commands'},
    {name: 'theme', desc: 'Toggle theme between green and red'},
    {name: 'clear', desc: 'Clear terminal screen'},
    {name: 'date', desc: 'Show current date/time'},
    {name: 'battery', desc: 'Show battery status'},
    {name: 'netstatus', desc: 'Show network status'},
    {name: 'notify', desc: 'Show a notification'},
    {name: 'fs', desc: 'Open file explorer window'},
    {name: 'settings', desc 'Open settings window'},
    {name: 'fps', desc: 'Toggle FPS counter'},
    {name: 'fullscreen', desc: 'Toggle fullscreen mode'},
    {name: 'sound', desc: 'Toggle sound on/off'},
  ];

  // File system (mock) for file explorer
  const fileSystem = {
    root: {
      name: '/',
      type: 'folder',
      children: {
        'home': {
          type: 'folder',
          children: {
            'user': {
              type:'folder',
              children: {
                'readme.txt': {type:'file', content:'Welcome to EDEX ULTRA!'},
                'notes.md': {type:'file', content:'# Notes\n- Cyber Terminal'},
              }
            }
          }
        },
        'etc': {
          type:'folder',
          children: {
            'config.cfg': {type:'file', content:'theme=green\nsound=true\nfullscreen=false\n'}
          }
        },
        'logs': {
          type:'folder',
          children: {
            'syslog.log': {type:'file', content: logLines.join('\n')}
          }
        }
      }
    }
  };

  // Windows management
  let windows = [];

  // Settings
  let settings = {
    soundOn: true,
    showFPS: true,
    fullscreen: false,
    theme: Themes.getTheme()
  };

  // Utilities for rounding CPU %
  function simulateUsage(usage) {
    let delta = Utils.randFloat(-3, 3);
    let newUsage = usage + delta;
    return Utils.clamp(newUsage, 5, 95);
  }

  // Update usage stats (simulate)
  function updateUsages() {
    cpuUsage = simulateUsage(cpuUsage || 10);
    ramUsage = simulateUsage(ramUsage || 25);
    gpuUsage = simulateUsage(gpuUsage || 8);
    storageUsage = 72; // static sim
    cpuTemp = Utils.clamp(50 + (cpuUsage * 0.4) + Utils.randFloat(-3,3), 40, 90);
  }

  // Update bars visually
  function updateBars() {
    cpuBar.style.width = cpuUsage.toFixed(1) + '%';
    ramBar.style.width = ramUsage.toFixed(1) + '%';
    gpuBar.style.width = gpuUsage.toFixed(1) + '%';
    storageBar.style.width = storageUsage.toFixed(1) + '%';
    tempBar.style.width = ((cpuTemp - 40) / 50 * 100).toFixed(1) + '%';
  }

  // Update top bar info: clock, date, battery, network, system status
  function updateTopStatus() {
    let now = new Date();
    liveClock.textContent = `${Utils.pad2(now.getHours())}:${Utils.pad2(now.getMinutes())}:${Utils.pad2(now.getSeconds())}`;
    liveDate.textContent = now.toDateString();

    // Battery API
    if(navigator.getBattery) {
      navigator.getBattery().then(batt => {
        batteryStatus.style.display = 'flex';
        batteryLevelPercent.textContent = Math.round(batt.level * 100) + '%';
      }).catch(() => batteryStatus.style.display = 'none');
    } else {
      batteryStatus.style.display = 'none';
    }

    // Network status
    const online = navigator.onLine;
    networkStatus.textContent = online ? 'Online' : 'Offline';
    systemStatus.textContent = online ? 'OK' : 'Offline';
  }

  // Terminal helpers
  function terminalPrintLine(text) {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = Utils.escapeHTML(text);
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function terminalClear() {
    terminal.innerHTML = '';
  }

  // Terminal blinking cursor management
  function updateCursor() {
    if(!terminalFocused) {
      removeCursor();
      return;
    }
    if(!terminal.querySelector('.cursor')) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      terminal.appendChild(cursor);
      terminal.scrollTop = terminal.scrollHeight;
    }
  }
  function removeCursor() {
    const cur = terminal.querySelector('.cursor');
    if(cur) cur.remove();
  }

  // Terminal command handling (visual only)
  function handleCommand(cmd) {
    cmd = cmd.trim();
    if(!cmd) return;
    cmdHistory.unshift(cmd);
    cmdHistoryIndex = -1;

    terminalPrintLine("> " + cmd);
    let output = '';
    switch(cmd.toLowerCase()) {
      case 'help':
        output = 'Available commands: ' + commands.map(c => c.name).join(', ');
        break;
      case 'clear':
        terminalClear();
        return;
      case 'date':
        output = new Date().toString();
        break;
      case 'battery':
        output = batteryStatus.style.display !== 'none' ? batteryLevelPercent.textContent : 'Battery status unavailable';
        break;
      case 'netstatus':
        output = navigator.onLine ? 'Online' : 'Offline';
        break;
      case 'notify':
        Notifications.show('Test notification from command', 5000);
        output = 'Notification sent';
        break;
      case 'theme':
        Themes.toggleTheme();
        output = 'Theme toggled';
        break;
      case 'fps':
        if(settings.showFPS) {
          settings.showFPS = false;
          PerformanceMonitor.show(false);
          output = 'FPS counter hidden';
        } else {
          settings.showFPS = true;
          PerformanceMonitor.show(true);
          output = 'FPS counter shown';
        }
        break;
      case 'fullscreen':
        toggleFullscreen();
        output = 'Toggled fullscreen mode';
        break;
      case 'sound':
        settings.soundOn = !settings.soundOn;
        output = 'Sound: ' + (settings.soundOn ? 'On' : 'Off');
        break;
      case 'fs':
        openFileExplorer();
        output = 'File explorer opened';
        break;
      case 'settings':
        openSettingsWindow();
        output = 'Settings window opened';
        break;
      default:
        output = `Command not found: ${cmd}`;
        break;
    }

    if(output) terminalPrintLine(output);
  }

  // Terminal input handling with on-screen keyboard and physical keyboard
  function terminalKeydownHandler(e) {
    if(e.ctrlKey || e.metaKey) {
      if(e.key === 'k') { // clear
        terminalClear();
        e.preventDefault();
        return;
      }
      if(e.key === 'ArrowUp') { // history back
        if(cmdHistory.length === 0) return;
        cmdHistoryIndex++;
        if(cmdHistoryIndex >= cmdHistory.length) cmdHistoryIndex = cmdHistory.length-1;
        terminalInput = cmdHistory[cmdHistoryIndex];
        updateTerminalInput();
        e.preventDefault();
        return;
      }
      if(e.key === 'ArrowDown') { // history forward
        cmdHistoryIndex--;
        if(cmdHistoryIndex < 0){ cmdHistoryIndex = -1; terminalInput=''; }
        else terminalInput = cmdHistory[cmdHistoryIndex] || '';
        updateTerminalInput();
        e.preventDefault();
        return;
      }
    }
    if(e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      terminalInput += e.key;
      updateTerminalInput();
      e.preventDefault();
      return;
    }
    if(e.key === 'Backspace') {
      terminalInput = terminalInput.slice(0, -1);
      updateTerminalInput();
      e.preventDefault();
      return;
    }
    if(e.key === 'Enter') {
      handleCommand(terminalInput);
      terminalInput = '';
      updateTerminalInput();
      e.preventDefault();
      return;
    }
  }

  function updateTerminalInput() {
    removeCursor();
    let lastLine = terminal.lastElementChild;
    if(!lastLine || !lastLine.classList.contains('inputLine')) {
      lastLine = document.createElement('div');
      lastLine.className = 'inputLine';
      terminal.appendChild(lastLine);
    }
    lastLine.innerHTML = '> ' + Utils.escapeHTML(terminalInput);
    updateCursor();
    terminal.scrollTop = terminal.scrollHeight;
  }

  // Command palette handling
  const cmdPalette = document.getElementById('commandPalette');
  const cmdInput = document.getElementById('commandInput');
  const cmdList = document.getElementById('commandList');
  let cmdSelectedIndex = -1;
  let cmdFiltered = [];

  function openCommandPalette() {
    cmdPalette.style.display = 'flex';
    cmdInput.focus();
    cmdInput.value = '';
    filterCommands('');
    cmdSelectedIndex = -1;
  }
  function closeCommandPalette() {
    cmdPalette.style.display = 'none';
  }
  function filterCommands(text) {
    const t = text.trim().toLowerCase();
    if(!t) {
      cmdFiltered = commands;
    } else {
      cmdFiltered = commands.filter(c => c.name.includes(t) || c.desc.includes(t));
    }
    renderCommandList();
  }
  function renderCommandList() {
    cmdList.innerHTML = '';
    cmdFiltered.forEach((cmd,i) => {
      const item = document.createElement('li');
      item.className = 'command smooth';
      item.setAttribute('role','option');
      if(i === cmdSelectedIndex) item.classList.add('selected');
      item.textContent = cmd.name + " — " + cmd.desc;
      item.tabIndex = -1;
      item.onclick = () => {
        executeCommand(cmd.name);
        closeCommandPalette();
      };
      cmdList.appendChild(item);
    });
  }
  function executeCommand(c) {
    terminalPrintLine("> " + c);
    handleCommand(c);
  }

  // Network monitor simulation with ping and graphs
  let lastPing = 0;
  function updateNetwork() {
    if(navigator.onLine) {
      let ping = Utils.randInt(25, 140);
      lastPing = ping;
      pingElem.textContent = `Ping: ${ping} ms`;
      // Update upload/download data simulate
      if(uploadHistory.length >= MAX_UPLOAD_HISTORY) uploadHistory.shift();
      if(downloadHistory.length >= MAX_DOWNLOAD_HISTORY) downloadHistory.shift();
      uploadHistory.push(Utils.randInt(12, 68));
      downloadHistory.push(Utils.randInt(25, 120));
      drawGraphs();
    } else {
      pingElem.textContent = 'Ping: -- ms';
      uploadHistory = [];
      downloadHistory = [];
      clearGraphs();
    }
  }
  function drawGraphs() {
    // Draw upload graph top-left green lines
    drawSparkline(uploadGraph, uploadHistory, varAccentColor());
    drawSparkline(downloadGraph, downloadHistory, varAccentColor());
  }
  function clearGraphs() {
    uploadGraph.clearRect(0, 0, 150, 80);
    downloadGraph.clearRect(0, 0, 150, 80);
  }
  function drawSparkline(ctx, data, color) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    const length = data.length;
    const sliceStep = ctx.canvas.width / (length - 1);
    const maxVal = 140;
    for(let i = 0; i < length; i++) {
      const x = i * sliceStep;
      const y = ctx.canvas.height - (data[i] / maxVal) * ctx.canvas.height;
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  function varAccentColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#0f0';
  }

  // Active processes display refresh
  function refreshActiveProcesses() {
    activeProcessesList.innerHTML = '';
    // Slightly simulate changes
    processes.forEach(proc => {
      proc.cpu = Utils.clamp(proc.cpu + Utils.randFloat(-0.3, 0.3), .1, 12);
      const li = document.createElement('li');
      li.textContent = `${proc.pid}  ${proc.name.padEnd(16, ' ')}  CPU: ${proc.cpu.toFixed(1)}%`;
      activeProcessesList.appendChild(li);
    });
  }

  // System log viewer update
  function appendLogLine(line) {
    logLines.push(line);
    if(logLines.length > 200) logLines.shift();
    systemLog.textContent = logLines.slice(-100).join('\n');
    systemLog.scrollTop = systemLog.scrollHeight;
  }

  // On-screen keyboard keys
  const keyboardKeys = [
    '1','2','3','4','5','6','7','8','9','0','Backspace',
    'q','w','e','r','t','y','u','i','o','p',
    'a','s','d','f','g','h','j','k','l','Enter',
    'z','x','c','v','b','n','m','.',',','/',
    'Space'
  ];

  // On-screen keyboard build
  function buildKeyboard() {
    bottomKeyboard.innerHTML = '';
    keyboardKeys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k === 'Space' ? ' ' : k;
      btn.setAttribute('aria-label', 'Key ' + (k === 'Space' ? 'Space' : k));
      btn.onclick = () => {
        if(k === 'Backspace') {
          terminalInput = terminalInput.slice(0, -1);
        } else if(k === 'Enter') {
          handle(terminalInput);
          terminalInput = '';
        } else if(k === 'Space') {
          terminalInput += ' ';
        } else {
          terminalInput += k;
        }
        updateTerminalInput();
      };
      bottomKeyboard.appendChild(btn);
    });
  }

  // Window system (draggable, resizable, minimize, maximize, close)
  function openWindow(title, contentElem) {
    const win = document.createElement('div');
    win.className = 'window';
    win.style.top = '100px';
    win.style.left = '100px';
    win.style.width = '360px';
    win.style.height = '260px';
    win.tabIndex = 0;
    win.setAttribute('role', 'dialog');
    win.setAttribute('aria-label', title);

    // Title bar
    const titlebar = document.createElement('div');
    titlebar.className = 'titlebar';
    titlebar.textContent = title;

    // Buttons Container
    const buttons = document.createElement('div');
    buttons.className = 'buttons';

    // Minimize button
    const btnMin = document.createElement('button');
    btnMin.title = 'Minimize';
    btnMin.innerHTML = '&#x2013;';
    buttons.appendChild(btnMin);

    // Maximize button
    const btnMax = document.createElement('button');
    btnMax.title = 'Maximize';
    btnMax.innerHTML = '&#x2610;';
    buttons.appendChild(btnMax);

    // Close button
    const btnClose = document.createElement('button');
    btnClose.title = 'Close';
    btnClose.innerHTML = '&#x2715;';
    buttons.appendChild(btnClose);

    // Append buttons
    titlebar.appendChild(buttons);
    win.appendChild(titlebar);

    // Content container
    const content = document.createElement('div');
    content.className = 'content';
    if (contentElem instanceof HTMLElement) {
      content.appendChild(contentElem);
    } else if (typeof contentElem === 'string') {
      content.innerHTML = contentElem;
    }
    win.appendChild(content);

    document.body.appendChild(win);
    windows.push(win);

    // Drag functionality
    let dragOffsetX = 0, dragOffsetY = 0;
    let dragging = false;

    titlebar.addEventListener('mousedown', e => {
      dragging = true;
      dragOffsetX = e.clientX - win.offsetLeft;
      dragOffsetY = e.clientY - win.offsetTop;
      win.style.zIndex = 11000;
      e.preventDefault();
    });
    document.addEventListener('mouseup', () => {
      dragging = false;
      win.style.zIndex = '';
    });
    document.addEventListener('mousemove', e => {
      if(dragging) {
        let x = e.clientX - dragOffsetX;
        let y = e.clientY - dragOffsetY;
        x = Math.max(0, Math.min(window.innerWidth - win.offsetWidth, x));
        y = Math.max(38, Math.min(window.innerHeight - win.offsetHeight, y));
        win.style.left = x + 'px';
        win.style.top = y + 'px';
      }
    });

    // Buttons behavior
    btnClose.onclick = () => {
      if (windows.includes(win)) {
        document.body.removeChild(win);
        windows = windows.filter(w => w !== win);
      }
    };
    btnMin.onclick = () => {
      content.style.display = content.style.display === 'none' ? 'block' : 'none';
      win.style.height = content.style.display === 'none' ? '38px' : '260px';
    };
    btnMax.onclick = () => {
      if(win.classList.contains('maximized')) {
        win.style.top = win.dataset.oldTop;
        win.style.left = win.dataset.oldLeft;
        win.style.width = win.dataset.oldWidth;
        win.style.height = win.dataset.oldHeight;
        win.classList.remove('maximized');
      } else {
        win.dataset.oldTop = win.style.top;
        win.dataset.oldLeft = win.style.left;
        win.dataset.oldWidth = win.style.width;
        win.dataset.oldHeight = win.style.height;
        win.style.top = '38px';
        win.style.left = '0px';
        win.style.width = window.innerWidth + 'px';
        win.style.height = (window.innerHeight - 38) + 'px';
        win.classList.add('maximized');
      }
    };

    return win;
  }

  // File explorer window
  function openFileExplorer() {
    // Build tree recursively
    function buildTree(node) {
      let ul = document.createElement('ul');
      ul.style.listStyle = 'none';
      ul.style.paddingLeft = '16px';
      for(const key in node.children) {
        const child = node.children[key];
        let li = document.createElement('li');
        li.style.cursor = 'pointer';
        li.style.userSelect = 'none';
        li.style.padding = '2px 6px';
        if(child.type === 'folder') {
          li.textContent = key + ' [Folder]';
          li.onclick = () => {
            if(li.nextSibling && li.nextSibling.tagName === "UL") {
              li.nextSibling.style.display = li.nextSibling.style.display === 'none' ? 'block' : 'none';
            } else {
              if(child.children)
                li.parentNode.insertBefore(buildTree(child), li.nextSibling);
            }
          };
        } else if(child.type === 'file') {
          li.textContent = key + ' [File]';
          li.onclick = () => {
            openFileViewer(key, child.content);
          };
        }
        ul.appendChild(li);
      }
      return ul;
    }
    // File viewer
    function openFileViewer(name, content) {
      const pre = document.createElement('pre');
      pre.textContent = content || '[Empty file]';
      let w = openWindow('File Viewer: ' + name, pre);
      w.style.width = '400px';
      w.style.height = '300px';
    }
    let tree = buildTree(fileSystem.root);
    openWindow('File Explorer', tree);
  }

  // Settings window
  function openSettingsWindow() {
    const container = document.createElement('div');
    container.id = 'settingsPanel';

    // Sound toggle
    const soundGroup = document.createElement('div');
    soundGroup.className = 'form-group';
    const soundLabel = document.createElement('label');
    const soundInput = document.createElement('input');
    soundInput.type = 'checkbox';
    soundInput.checked = settings.soundOn;
    soundInput.id = 'soundToggle';
    soundLabel.htmlFor = soundInput.id;
    soundLabel.textContent = 'Sound';
    soundGroup.appendChild(soundInput);
    soundGroup.appendChild(soundLabel);
    container.appendChild(soundGroup);

    // FPS toggle
    const fpsGroup = document.createElement('div');
    fpsGroup.className = 'form-group';
    const fpsLabel = document.createElement('label');
    const fpsInput = document.createElement('input');
    fpsInput.type = 'checkbox';
    fpsInput.checked = settings.showFPS;
    fpsInput.id = 'fpsToggle';
    fpsLabel.htmlFor = fpsInput.id;
    fpsLabel.textContent = 'Show FPS Counter';
    fpsGroup.appendChild(fpsInput);
    fpsGroup.appendChild(fpsLabel);
    container.appendChild(fpsGroup);

    // Theme toggle
    const themeGroup = document.createElement('div');
    themeGroup.className = 'form-group';
    const themeLabel = document.createElement('label');
    const themeSelect = document.createElement('select');
    themeSelect.id = 'themeSelect';
    ['green','red'].forEach(t => {
      const option = document.createElement('option');
      option.value = t;
      option.textContent = t.toUpperCase();
      if(t === Themes.getTheme()) option.selected = true;
      themeSelect.appendChild(option);
    });
    themeLabel.textContent = 'Theme';
    themeGroup.appendChild(themeLabel);
    themeGroup.appendChild(themeSelect);
    container.appendChild(themeGroup);

    // Fullscreen toggle
    const fullGroup = document.createElement('div');
    fullGroup.className = 'form-group';
    const fullLabel = document.createElement('label');
    const fullInput = document.createElement('input');
    fullInput.type = 'checkbox';
    fullInput.checked = settings.fullscreen;
    fullInput.id = 'fullscreenToggle';
    fullLabel.htmlFor = fullInput.id;
    fullLabel.textContent = 'Fullscreen Mode';
    fullGroup.appendChild(fullInput);
    fullGroup.appendChild(fullLabel);
    container.appendChild(fullGroup);

    // Event listeners
    soundInput.addEventListener('change', () => {
      settings.soundOn = soundInput.checked;
      Notifications.show(`Sound ${settings.soundOn ? 'On' : 'Off'}`, 2000);
    });
    fpsInput.addEventListener('change', () => {
      settings.showFPS = fpsInput.checked;
      PerformanceMonitor.show(settings.showFPS);
      Notifications.show(`FPS Counter ${settings.showFPS ? 'Shown' : 'Hidden'}`, 2000);
    });
    themeSelect.addEventListener('change', () => {
      Themes.applyTheme(themeSelect.value);
    });
    fullInput.addEventListener('change', () => {
      settings.fullscreen = fullInput.checked;
      if(settings.fullscreen){
        enterFullscreen();
      } else {
        exitFullscreen();
      }
    });

    openWindow('Settings', container);
  }

  // Fullscreen controls
  function enterFullscreen() {
    if(document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    } else if(document.documentElement.webkitRequestFullscreen) {
      document.documentElement.webkitRequestFullscreen();
    }
  }
  function exitFullscreen() {
    if(document.exitFullscreen) {
      document.exitFullscreen();
    } else if(document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  }
  function toggleFullscreen() {
    if(document.fullscreenElement) exitFullscreen();
    else enterFullscreen();
  }

  // Keyboard shortcuts
  function setupShortcuts() {
    window.addEventListener('keydown', e => {
      if(e.altKey && e.key.toLowerCase() === 't') {
        // open terminal (focus)
        terminal.focus();
        e.preventDefault();
      }
      if(e.ctrlKey && e.key.toLowerCase() === 'p') {
        // open command palette
        openCommandPalette();
        e.preventDefault();
      }
      if(e.key === 'Escape') {
        // Close command palette
        if(cmdPalette.style.display === 'flex') {
          closeCommandPalette();
          e.preventDefault();
        }
      }
    });
  }

  // Cursor blinking interval
  setInterval(() => {
    if(terminalFocused) {
      cursorVisible = !cursorVisible;
      const cursor = terminal.querySelector('.cursor');
      if(cursor) cursor.style.opacity = cursorVisible ? '1' : '0';
    }
  }, 500);

  // Auto typing simulation (for demo)
  let autoTypeText = '';
  let autoTypingIndex = 0;
  let typingIntervalId = null;
  function startAutoTyping(text) {
    autoTypeText = text;
    autoTypingIndex = 0;
    clearInterval(typingIntervalId);
    typingIntervalId = setInterval(() => {
      if(autoTypingIndex < autoTypeText.length) {
        terminalInput += autoTypeText.charAt(autoTypingIndex);
        updateTerminalInput();
        autoTypingIndex++;
      } else {
        clearInterval(typingIntervalId);
      }
    }, 70);
  }
  function stopAutoTyping() {
    clearInterval(typingIntervalId);
  }

  // Initialization
  function init() {
    cpuUsage = 15;
    ramUsage = 33;
    gpuUsage = 5;
    storageUsage = 63;
    cpuTemp = 45;
    updateBars();
    updateTopStatus();

    // Periodic updates
    setInterval(() => {
      updateUsages();
      updateBars();
      updateTopStatus();
      updateNetwork();
      refreshActiveProcesses();
      appendLogLine(`[${new Date().toLocaleTimeString()}] System running smoothly.`);
    }, 4000);

    // Build keyboard
    buildKeyboard();

    // Terminal focus/tabindex
    terminal.tabIndex = 0;
    terminal.addEventListener('focus', () => { terminalFocused = true; updateCursor(); });
    terminal.addEventListener('blur', () => { terminalFocused = false; removeCursor(); });
    terminal.addEventListener('keydown', terminalKeydownHandler);

    // Command palette events
    cmdInput.addEventListener('input', () => filterCommands(cmdInput.value));
    cmdInput.addEventListener('keydown', e => {
      if(e.key === 'ArrowDown') {
        cmdSelectedIndex++;
        if(cmdSelectedIndex >= cmdFiltered.length) cmdSelectedIndex = 0;
        renderCommandList();
        e.preventDefault();
      } else if(e.key === 'ArrowUp') {
        cmdSelectedIndex--;
        if(cmdSelectedIndex < 0) cmdSelectedIndex = cmdFiltered.length -1;
        renderCommandList();
        e.preventDefault();
      } else if(e.key === 'Enter') {
        if(cmdSelectedIndex >= 0 && cmdSelectedIndex < cmdFiltered.length) {
          executeCommand(cmdFiltered[cmdSelectedIndex].name);
          closeCommandPalette();
          e.preventDefault();
        }
      } else if(e.key === 'Escape') {
        closeCommandPalette();
        e.preventDefault();
      }
    });

    // Show/hide FPS
    PerformanceMonitor.show(settings.showFPS);

    // Theme application from stored setting
    Themes.applyTheme(settings.theme);

    // Keyboard shortcuts setup
    setupShortcuts();

    // Initial auto-typing demo welcome message
    startAutoTyping('Type "help" for commands...');
  }

  return {init};
})();

/* SOUND / AUDIO MODULE (mock) */
const Sound = (() => {
  let soundOn = true;
  function toggle() { soundOn = !soundOn; }
  function play(type) {
    if(!soundOn) return;
    // Simple beep sound (no external libs)
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = type === 'notify' ? 880 : 440;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.stop(ctx.currentTime + 0.15);
      osc.onended = () => ctx.close();
    } catch(e) {
      // Audio blocked or unsupported
    }
  }
  return {toggle, play};
})();

/* MAIN INITIALIZATION */
window.onload = async () => {
  Background.init();
  // Start boot sequence, dashboard init calls after
  await BootSequence.start();

  // Start animation loop
  function animate() {
    PerformanceMonitor.frame();
    Background.init()(); // We keep redraw on resize event only
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
};

document.addEventListener('fullscreenchange', () => {
  const isFS = !!document.fullscreenElement;
  // Update UI or settings if needed
});
