<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBY X MASTER V4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-color: #030000;
            --neon-red: #ff003c;
            --dark-red: #8a001a;
            --text-main: #ffffff;
            --glass-bg: rgba(10, 0, 0, 0.75);
            --glass-border: rgba(255, 0, 60, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Matrix Hacker Background */
        canvas#matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* Particles Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-red);
            border-right: 3px solid var(--dark-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px var(--neon-red);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Container & Glassmorphism */
        .container {
            width: 90%;
            max-width: 850px;
            margin: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 35px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.25);
            position: relative;
            z-index: 10;
        }

        /* Typography & Glitch Effect */
        h1, h2, #loader-text {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--neon-red);
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .glitch {
            position: relative;
            text-shadow: 0 0 10px var(--neon-red);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 2px 0 #ff003c, -2px 0 #00ffff; }
            20% { text-shadow: -2px 0 #ff003c, 2px 0 #00ffff; }
            40% { text-shadow: 2px 0 #ff003c, -2px 0 #00ffff; }
            60% { text-shadow: -2px 0 #ff003c, 2px 0 #00ffff; }
            80% { text-shadow: 2px 0 #ff003c, -2px 0 #00ffff; }
            100% { text-shadow: -2px 0 #ff003c, 2px 0 #00ffff; }
        }

        /* Inputs & Textareas */
        input, textarea, select {
            width: 100%;
            background: rgba(20, 0, 0, 0.6);
            border: 1px solid var(--neon-red);
            color: var(--text-main);
            padding: 14px;
            border-radius: 4px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            font-size: 16px;
            font-family: monospace;
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
            background: rgba(40, 0, 0, 0.8);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Fixed AES Key Styling */
        #crypto-key {
            color: var(--neon-red);
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            background: rgba(255, 0, 60, 0.05);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 12px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,60,0.4), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: var(--neon-red);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--neon-red);
            transform: scale(1.02);
        }

        /* Language Selector */
        .lang-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--dark-red);
            padding-bottom: 10px;
        }
        
        .lang-container span {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-red);
            font-size: 12px;
        }

        .lang-container select {
            width: auto;
            padding: 6px 12px;
            margin: 0;
            font-size: 14px;
            cursor: pointer;
        }

        /* Screens */
        #app-screen { display: none; }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--neon-red);
            margin-top: auto;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-red);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--bg-color);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            text-align: center;
            border-radius: 4px;
            padding: 15px;
            position: fixed;
            z-index: 10000;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.8);
            opacity: 0;
            transition: opacity 0.4s, bottom 0.4s;
            text-transform: uppercase;
            font-weight: bold;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 22px; }
            .btn-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="particles-js"></div>

    <div id="loader">
        <div class="loader-ring"></div>
        <h2 id="loader-text" style="margin-top: 25px;">INITIALIZING V4...</h2>
    </div>

    <div id="login-screen" class="container" style="margin-top: 15vh;">
        <h1 class="glitch">🔐 SECURE TERMINAL</h1>
        <input type="password" id="gate-password" placeholder="ENTER ACCESS PROTOCOL">
        <button style="width: 100%; padding: 15px; font-size: 16px;" onclick="checkPassword()">AUTHORIZE</button>
    </div>

    <div id="app-screen" class="container" style="margin-top: 5vh; margin-bottom: 5vh;">
        
        <div class="lang-container">
            <span>[ SYSTEM LANGUAGE ]</span>
            <select id="lang-select" onchange="triggerLanguageChange()">
                <option value="en">ENG - English</option>
                <option value="es">ESP - Español</option>
                <option value="hi">HIN - हिंदी</option>
            </select>
        </div>

        <h1 id="title-text" class="glitch">RUBY X MASTER V4</h1>

        <textarea id="input-text" placeholder="[ INPUT DATA STREAM ]"></textarea>
        
        <input type="text" id="crypto-key" value="RUBY_PREIMINUM" placeholder="AES Master Key">

        <div class="btn-grid">
            <button id="btn-aes-enc" onclick="processAES('encrypt')">AES ENCRYPT</button>
            <button id="btn-aes-dec" onclick="processAES('decrypt')">AES DECRYPT</button>
            <button id="btn-b64-enc" onclick="processBase64('encode')">B64 ENCODE</button>
            <button id="btn-b64-dec" onclick="processBase64('decode')">B64 DECODE</button>
        </div>

        <textarea id="output-text" placeholder="[ ENCRYPTED / DECRYPTED OUTPUT ]" readonly></textarea>

        <div class="btn-grid" style="grid-template-columns: 1fr 1fr;">
            <button id="btn-copy" onclick="copyOutput()">📋 EXTRACT COPY</button>
            <button id="btn-download" onclick="downloadCode()">💾 SAVE FILE</button>
        </div>
    </div>

    <div id="toast">Notification</div>

    <footer>[ TEAM RUBY ] // POWERED BY RUBYGameingOP</footer>

    <script>
        // --- 1. Matrix Background Logic ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01RUBYXMASTERハッカー'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff003c';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 2. Loader & Initialization ---
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 400);
            }, 1500);
            initParticles();
        };

        // --- 3. Particles.js Configuration ---
        function initParticles() {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60 },
                    "color": { "value": "#ff003c" },
                    "shape": { "type": "triangle" },
                    "opacity": { "value": 0.4, "random": true },
                    "size": { "value": 4, "random": true },
                    "line_linked": { "enable": true, "distance": 120, "color": "#ff003c", "opacity": 0.3, "width": 1 },
                    "move": { "enable": true, "speed": 3, "direction": "none", "random": true }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "repulse" } },
                    "modes": { "grab": { "distance": 150, "line_linked": { "opacity": 0.8 } }, "repulse": { "distance": 150, "duration": 0.4 } }
                }
            });
        }

        // --- 4. Password Gate Logic (V4) ---
        function checkPassword() {
            const pass = document.getElementById('gate-password').value;
            // NEW SECRET PASSWORD
            if(pass === 'RUBYXDARKNESS') {
                showToast("ACCESS GRANTED. WELCOME.");
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
            } else {
                showToast("ACCESS DENIED.");
                document.getElementById('gate-password').value = '';
            }
        }

        // --- 5. Toast Notification Logic ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- 6. Encryption & Decryption (AES) ---
        function processAES(action) {
            const text = document.getElementById('input-text').value;
            const key = document.getElementById('crypto-key').value;
            const output = document.getElementById('output-text');

            if (!text || !key) {
                showToast("DATA AND KEY REQUIRED.");
                return;
            }

            try {
                if (action === 'encrypt') {
                    const encrypted = CryptoJS.AES.encrypt(text, key).toString();
                    output.value = encrypted;
                    showToast("AES ENCRYPTION COMPLETE.");
                } else {
                    const decrypted = CryptoJS.AES.decrypt(text, key).toString(CryptoJS.enc.Utf8);
                    if(!decrypted) throw new Error("Bad key");
                    output.value = decrypted;
                    showToast("AES DECRYPTION COMPLETE.");
                }
            } catch (e) {
                showToast("ERROR: KEY MISMATCH OR CORRUPTION.");
                output.value = "";
            }
        }

        // --- 7. Base64 Logic ---
        function processBase64(action) {
            const text = document.getElementById('input-text').value;
            const output = document.getElementById('output-text');

            if (!text) {
                showToast("INPUT REQUIRED.");
                return;
            }

            try {
                if (action === 'encode') {
                    output.value = btoa(unescape(encodeURIComponent(text)));
                    showToast("B64 ENCODE COMPLETE.");
                } else {
                    output.value = decodeURIComponent(escape(atob(text)));
                    showToast("B64 DECODE COMPLETE.");
                }
            } catch (e) {
                showToast("ERROR: INVALID B64 FORMAT.");
                output.value = "";
            }
        }

        // --- 8. Copy to Clipboard ---
        function copyOutput() {
            const output = document.getElementById('output-text');
            if(output.value === "") {
                showToast("NO DATA TO EXTRACT.");
                return;
            }
            output.select();
            document.execCommand("copy");
            showToast("DATA EXTRACTED TO CLIPBOARD.");
        }

        // --- 9. Download Code ---
        function downloadCode() {
            const text = document.getElementById('output-text').value;
            if(text === "") {
                showToast("NO DATA TO SAVE.");
                return;
            }
            const blob = new Blob([text], { type: "text/plain" });
            const anchor = document.createElement("a");
            anchor.download = "RubyV4_Data.txt";
            anchor.href = window.URL.createObjectURL(blob);
            anchor.target ="_blank";
            anchor.style.display = "none";
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            showToast("FILE DOWNLOAD INITIATED.");
        }

        // --- 10. Language Switcher with Loading Screen ---
        const uiDict = {
            en: {
                title: "RUBY X MASTER V4",
                inputPlaceholder: "[ INPUT DATA STREAM ]",
                outputPlaceholder: "[ ENCRYPTED / DECRYPTED OUTPUT ]",
                btnAesEnc: "AES ENCRYPT",
                btnAesDec: "AES DECRYPT",
                btnB64Enc: "B64 ENCODE",
                btnB64Dec: "B64 DECODE",
                btnCopy: "📋 EXTRACT COPY",
                btnDownload: "💾 SAVE FILE",
                loaderText: "TRANSLATING MODULES..."
            },
            es: {
                title: "RUBY X MAESTRO V4",
                inputPlaceholder: "[ FLUJO DE DATOS ]",
                outputPlaceholder: "[ SALIDA CIFRADA / DESCIFRADA ]",
                btnAesEnc: "CIFRAR AES",
                btnAesDec: "DESCIFRAR AES",
                btnB64Enc: "CODIFICAR B64",
                btnB64Dec: "DECODIFICAR B64",
                btnCopy: "📋 EXTRAER COPIA",
                btnDownload: "💾 GUARDAR ARCHIVO",
                loaderText: "TRADUCIENDO MÓDULOS..."
            },
            hi: {
                title: "रूबी एक्स मास्टर V4",
                inputPlaceholder: "[ डेटा स्ट्रीम दर्ज करें ]",
                outputPlaceholder: "[ एन्क्रिप्टेड / डिक्रिप्टेड आउटपुट ]",
                btnAesEnc: "AES एन्क्रिप्ट",
                btnAesDec: "AES डिक्रिप्ट",
                btnB64Enc: "B64 एनकोड",
                btnB64Dec: "B64 डिकोड",
                btnCopy: "📋 कॉपी निकालें",
                btnDownload: "💾 फ़ाइल सहेजें",
                loaderText: "मॉड्यूल का अनुवाद हो रहा है..."
            }
        };

        function triggerLanguageChange() {
            const lang = document.getElementById('lang-select').value;
            const dict = uiDict[lang];
            
            // Show Loader
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');
            
            loaderText.innerText = dict.loaderText || "UPDATING...";
            loader.style.display = 'flex';
            
            // Small timeout to allow display:flex to apply before changing opacity
            setTimeout(() => {
                loader.style.opacity = '1';
            }, 10);

            // Simulate loading time, then apply changes and hide loader
            setTimeout(() => {
                document.getElementById('title-text').innerText = dict.title;
                document.getElementById('input-text').placeholder = dict.inputPlaceholder;
                document.getElementById('output-text').placeholder = dict.outputPlaceholder;
                
                document.getElementById('btn-aes-enc').innerText = dict.btnAesEnc;
                document.getElem
